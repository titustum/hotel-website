<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2d4a"/>
      <stop offset="100%" style="stop-color:#2d4168"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6b86a"/>
      <stop offset="100%" style="stop-color:#c9933a"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)"/>

  <!-- Roof / Gable peak -->
  <polygon points="32,10 52,26 12,26" fill="url(#goldGrad)"/>

  <!-- Roof ridge accent line -->
  <line x1="32" y1="10" x2="32" y2="26" stroke="#fff" stroke-width="1" opacity="0.25"/>

  <!-- Building body -->
  <rect x="16" y="26" width="32" height="22" fill="#fff" opacity="0.95"/>

  <!-- Door -->
  <rect x="27" y="35" width="10" height="13" rx="5" fill="url(#goldGrad)"/>
  <!-- Door knob -->
  <circle cx="35" cy="42" r="1" fill="#fff" opacity="0.8"/>

  <!-- Left window -->
  <rect x="19" y="30" width="6" height="6" rx="1" fill="url(#goldGrad)" opacity="0.85"/>
  <!-- Left window cross -->
  <line x1="22" y1="30" x2="22" y2="36" stroke="#fff" stroke-width="0.8" opacity="0.6"/>
  <line x1="19" y1="33" x2="25" y2="33" stroke="#fff" stroke-width="0.8" opacity="0.6"/>

  <!-- Right window -->
  <rect x="39" y="30" width="6" height="6" rx="1" fill="url(#goldGrad)" opacity="0.85"/>
  <!-- Right window cross -->
  <line x1="42" y1="30" x2="42" y2="36" stroke="#fff" stroke-width="0.8" opacity="0.6"/>
  <line x1="39" y1="33" x2="45" y2="33" stroke="#fff" stroke-width="0.8" opacity="0.6"/>

  <!-- Ground line -->
  <rect x="12" y="48" width="40" height="2" rx="1" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- Decorative star/diamond above roof tip -->
  <polygon points="32,5 33.2,8 36,8 33.9,9.8 34.7,12.5 32,10.8 29.3,12.5 30.1,9.8 28,8 30.8,8"
    fill="url(#goldGrad)"/>
</svg>